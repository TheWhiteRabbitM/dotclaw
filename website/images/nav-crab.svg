<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6007A"/>
      <stop offset="50%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6007A"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  
  <!-- Left claw arm -->
  <path d="M8 28 C6 22, 8 14, 12 12" stroke="url(#clawGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Left claw pincer -->
  <path d="M12 12 C10 10, 8 10, 8 14" stroke="url(#clawGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M12 12 C14 10, 14 12, 12 15" stroke="url(#clawGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Right claw arm -->
  <path d="M32 28 C34 22, 32 14, 28 12" stroke="url(#clawGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Right claw pincer -->
  <path d="M28 12 C30 10, 32 10, 32 14" stroke="url(#clawGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M28 12 C26 10, 26 12, 28 15" stroke="url(#clawGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="20" cy="25" rx="10" ry="9" fill="url(#navGrad)"/>
  
  <!-- Eye left -->
  <circle cx="16" cy="22" r="2.8" fill="#0a0a0f"/>
  <circle cx="16.5" cy="21.5" r="1" fill="#E6007A"/>
  
  <!-- Eye right -->
  <circle cx="24" cy="22" r="2.8" fill="#0a0a0f"/>
  <circle cx="24.5" cy="21.5" r="1" fill="#E6007A"/>
  
  <!-- Smile -->
  <path d="M17 28 Q20 30, 23 28" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>