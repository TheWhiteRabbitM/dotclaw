<!-- Moonbeam Logo - Official Style -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#53CBC8" stroke-width="3"/>
  <!-- Inner circle/moon -->
  <circle cx="32" cy="32" r="12" fill="#53CBC8"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#0a0a0f"/>
  <!-- Rays -->
  <g stroke="#53CBC8" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="2" x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="62"/>
    <line x1="2" y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="62" y2="32"/>
    <line x1="10.8" y1="10.8" x2="16.4" y2="16.4"/>
    <line x1="47.6" y1="47.6" x2="53.2" y2="53.2"/>
    <line x1="53.2" y1="10.8" x2="47.6" y2="16.4"/>
    <line x1="16.4" y1="47.6" x2="10.8" y2="53.2"/>
  </g>
</svg>